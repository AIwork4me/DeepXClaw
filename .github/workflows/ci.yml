name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Lint with ruff
        run: uv run ruff check src/

      - name: Check imports
        run: uv run python -c "import deepxclaw; print('OK')"

  build-wheel:
    runs-on: ubuntu-latest
    needs: lint-and-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Build wheel
        run: uv build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/
